# Strategy search space — tuned for INTRADAY (15-minute) gold futures.
#
# Lookbacks are in BARS at the trading timeframe. On 15-minute bars these
# shorter windows produce a handful of trades per day (day-trading), versus the
# multi-day holds a daily timeframe would give. Keep grids small: every extra
# combination inflates the multiple-testing penalty (Deflated Sharpe).
#
# `type: grid` -> optimizer enumerates the cartesian product of the lists.

ema_cross:
  description: "Trend: long when fast EMA > slow EMA, short otherwise."
  type: grid
  params:
    fast: [5, 10, 20]
    slow: [30, 50, 100]
    atr_period: [14]
    atr_stop_mult: [1.5, 2.5]

rsi_bollinger:
  description: "Mean reversion: RSI extreme + Bollinger band touch, exit at mid."
  type: grid
  params:
    rsi_period: [7, 14]
    rsi_low: [25, 30]
    rsi_high: [70, 75]
    bb_period: [20]
    bb_std: [2.0, 2.5]
    atr_stop_mult: [1.5, 2.5]

donchian_breakout:
  description: "Breakout: enter on N-bar high/low break, exit on opposite channel."
  type: grid
  params:
    entry_lookback: [10, 20, 40]
    exit_lookback: [5, 10]
    atr_period: [14]
    atr_stop_mult: [1.5, 2.5]

macd_trend:
  description: "Trend: MACD line vs signal, with a slower regime filter."
  type: grid
  params:
    fast: [12]
    slow: [26]
    signal: [9]
    regime_ma: [50, 100]
    atr_stop_mult: [1.5, 2.5]

search:
  max_trials_per_family: 200
  optimizer: grid
  walk_forward:
    scheme: rolling
    train_bars: 1500
    test_bars: 400
    step_bars: 400
