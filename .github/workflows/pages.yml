name: pages

# Publishes the static gold-bot dashboard (gold-bot/docs) to GitHub Pages.
# The compute layer (separate workflows) writes gold-bot/docs/data/*.json,
# which this workflow simply serves. No Python build step — it's pure static.

on:
  push:
    branches: [ main ]
    paths:
      - 'gold-bot/docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: gold-bot/docs
      - id: deployment
        uses: actions/deploy-pages@v4
